<!DOCTYPE html>

<html lang="{{ current_language }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | MedVision AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
min-height:100vh;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
}
</style>

</head>

<body>

<div class="fixed right-4 top-4 z-10 flex gap-2 rounded-full bg-white/10 p-1 text-xs font-bold text-white backdrop-blur">
{% for code, label in language_options.items() %}
<a href="{{ url_for('set_language', language_code=code, next=request.full_path) }}" class="rounded-full px-3 py-2 {% if current_language == code %}bg-white text-blue-700{% endif %}">
{{ label }}
</a>
{% endfor %}
</div>

<div class="flex items-center justify-center min-h-screen px-5">

<div class="glass max-w-md w-full rounded-3xl p-10 shadow-2xl">

<h1 class="text-3xl text-white font-bold text-center">
{{ _("Reset Password") }}
</h1>

<p class="text-gray-300 text-center mt-3">
{{ _("Enter your email address") }}
</p>

<form action="/forgot_password" method="POST" class="mt-8">

<input
type="email"
name="email"
required
placeholder="Enter Email"
class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white">

<button
type="submit"
class="w-full mt-6 bg-cyan-500 hover:bg-cyan-600 py-4 rounded-xl text-white font-semibold">

{{ _("Send Reset Link") }}

</button>

</form>

<div class="text-center mt-5">

<a href="/login" class="text-cyan-300">
{{ _("Back to Login") }}
</a>

</div>

</div>

</div>

</body>
</html>
