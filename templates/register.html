<!DOCTYPE html>

<html lang="{{ current_language }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | MedVision AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);
min-height:100vh;

}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.08);
animation:float 8s infinite ease-in-out;
}

.circle1{
width:250px;
height:250px;
top:-80px;
left:-80px;
}

.circle2{
width:300px;
height:300px;
bottom:-100px;
right:-100px;
}

@keyframes float{
50%{
transform:translateY(-25px);
}
}

</style>

</head>

<body>

<div class="fixed right-4 top-4 z-10 flex gap-2 rounded-full bg-white/10 p-1 text-xs font-bold text-white backdrop-blur">
{% for code, label in language_options.items() %}
<a href="{{ url_for('set_language', language_code=code, next=request.full_path) }}" class="rounded-full px-3 py-2 {% if current_language == code %}bg-white text-blue-700{% endif %}">
{{ label }}
</a>
{% endfor %}
</div>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="flex justify-center items-center min-h-screen px-5">

<div class="glass w-full max-w-lg rounded-3xl p-10 shadow-2xl">

<div class="text-center">

<h1 class="text-4xl font-bold text-white">
{{ _("Create Account") }}
</h1>

<p class="text-gray-300 mt-3">
{{ _("Join MedVision AI Healthcare Platform") }}
</p>

</div>

<form action="/register" method="POST" class="mt-8">

<div>
<label class="text-white block mb-2">
{{ _("Full Name") }}
</label>

<input
type="text"
name="name"
required
placeholder="Enter Full Name"
class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white">

</div>

<div class="mt-4">

<label class="text-white block mb-2">
{{ _("Email Address") }}
</label>

<input
type="email"
name="email"
required
placeholder="Enter Email"
class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white">

</div>

<div class="mt-4">

<label class="text-white block mb-2">
{{ _("Password") }}
</label>

<input
type="password"
name="password"
required
placeholder="Create Password"
class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white">

</div>

<div class="mt-4">

<label class="text-white block mb-2">
{{ _("Confirm Password") }}
</label>

<input
type="password"
name="confirm_password"
required
placeholder="Confirm Password"
class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white">

</div>

<button
type="submit"
class="w-full mt-8 bg-blue-500 hover:bg-blue-600 py-4 rounded-xl text-white font-semibold">

{{ _("Create Account") }}

</button>

</form>

<div class="text-center mt-6">

<p class="text-gray-300">

{{ _("Already have an account?") }}

<a href="/login"
class="text-cyan-300 font-semibold">

{{ _("Login") }}

</a>

</p>

</div>

</div>

</div>

</body>
</html>
